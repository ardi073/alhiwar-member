<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar / Masuk - Al-Hiwar Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#115e59', secondary: '#14b8a6', accent: '#f59e0b' }, fontFamily: { sans: ['Outfit', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f3f4f6; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-8 sm:p-10 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-teal-100 rounded-full blur-3xl opacity-60"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-amber-100 rounded-full blur-3xl opacity-60"></div>

        <div class="relative z-10 text-center mb-8">
            <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-lg text-white font-bold text-4xl mx-auto mb-4">
                <i class='bx bx-book-open'></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900" id="form-title">Daftar Akun Baru</h2>
            <p class="text-gray-500 mt-2 text-sm" id="form-subtitle">Langkah pertama menuju kelancaran berbahasa Arab.</p>
        </div>

        <!-- Alert Box -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-xl text-sm font-medium border"></div>

        <form id="auth-form" class="relative z-10 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class='bx bx-envelope text-xl'></i>
                    </div>
                    <input type="email" id="email" required class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="anda@email.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kata Sandi</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class='bx bx-lock-alt text-xl'></i>
                    </div>
                    <input type="password" id="password" required class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="Minimal 6 karakter">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full flex items-center justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-primary hover:bg-teal-900 transition-all duration-300 transform hover:-translate-y-0.5 mt-2">
                <i class='bx bx-loader-alt bx-spin mr-2 hidden' id="loading-spinner"></i>
                <span id="submit-text">Daftar Sekarang</span>
            </button>
        </form>

        <div class="mt-8 text-center relative z-10">
            <p class="text-sm text-gray-600">
                <span id="toggle-text">Sudah punya akun?</span> 
                <button onclick="toggleMode()" id="toggle-btn" class="font-bold text-primary hover:text-teal-900 transition-colors ml-1">Masuk di sini</button>
            </p>
            <a href="index.html" class="inline-block mt-4 text-sm text-gray-400 hover:text-gray-600">
                <i class='bx bx-arrow-back'></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        // INISIALISASI SUPABASE
        const supabaseUrl = 'https://cjwufugmuhzbvmbixjyx.supabase.co';
        const supabaseKey = 'sb_publishable_L_Ds2zgmc_vK8Unkb-mB4A_cU6BDGEY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let isLoginMode = false;
        const form = document.getElementById('auth-form');
        const alertBox = document.getElementById('alert-box');
        const submitBtn = document.getElementById('submit-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const submitText = document.getElementById('submit-text');

        // Cek apakah user sudah login sebelumnya
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkSession();

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? 'Selamat Datang Kembali' : 'Daftar Akun Baru';
            document.getElementById('form-subtitle').innerText = isLoginMode ? 'Masuk untuk melanjutkan pembelajaran Anda.' : 'Langkah pertama menuju kelancaran berbahasa Arab.';
            document.getElementById('submit-text').innerText = isLoginMode ? 'Masuk' : 'Daftar Sekarang';
            document.getElementById('toggle-text').innerText = isLoginMode ? 'Belum punya akun?' : 'Sudah punya akun?';
            document.getElementById('toggle-btn').innerText = isLoginMode ? 'Daftar di sini' : 'Masuk di sini';
            alertBox.classList.add('hidden');
        }

        function showAlert(msg, isError = true) {
            alertBox.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200', 'bg-green-50', 'text-green-700', 'border-green-200');
            if (isError) {
                alertBox.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
                alertBox.innerHTML = `<i class='bx bx-error-circle mr-1'></i> ${msg}`;
            } else {
                alertBox.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
                alertBox.innerHTML = `<i class='bx bx-check-circle mr-1'></i> ${msg}`;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            loadingSpinner.classList.remove('hidden');

            try {
                if (isLoginMode) {
                    // PROSES LOGIN
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'dashboard.html';
                } else {
                    // PROSES DAFTAR
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    
                    if (data.user && data.user.identities && data.user.identities.length === 0) {
                        showAlert('Email sudah terdaftar. Silakan login.');
                    } else {
                        // Tambahkan ke tabel users_premium (meskipun secara default is_premium false)
                        await supabase.from('users_premium').insert([
                            { id: data.user.id, email: email, is_premium: false }
                        ]);
                        showAlert('Pendaftaran Berhasil! Mengalihkan...', false);
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                    }
                }
            } catch (error) {
                showAlert(error.message === 'Invalid login credentials' ? 'Email atau kata sandi salah.' : error.message);
            } finally {
                // Reset loading
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70');
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
